    <text x="1104" y="219" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="22" font-weight="700">4</text>
    <text x="1140" y="219" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14">结果维度</text>
    <text x="1104" y="240" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="12">先收益，后扩展</text>
