    <text x="60" y="98" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="36" font-weight="700" fill="url(#titleGradient)">工作方式重构</text>
    <text x="60" y="682" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" fill="#A0AEC0">企业 AI 营销工作台</text>
    <text x="1220" y="682" text-anchor="end" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" fill="#A0AEC0">04</text>
  </g>
