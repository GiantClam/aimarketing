      <text x="488" y="392" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">统一接入业务数据</text>
      <text x="488" y="436" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">AI生成洞察与策略建议</text>
      <text x="488" y="480" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">自动化任务联动执行</text>
      <text x="488" y="524" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">效果回收形成日内优化</text>
      <path fill="#EBF4FB" stroke="#63B3ED" d="M498,557 H782 A10,10 0 0 1 792,567 V589 A10,10 0 0 1 782,599 H498 A10,10 0 0 1 488,589 V567 A10,10 0 0 1 498,557 Z" />
