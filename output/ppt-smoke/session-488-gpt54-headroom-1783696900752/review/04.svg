      <text x="88" y="332" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="700" fill="#1A202C">系统多，动作碎</text>
      <line x1="88" y1="350" x2="392" y2="350" stroke="#E2E8F0" stroke-width="1" />
      <text x="88" y="392" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">数据整合靠导表</text>
      <text x="88" y="436" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">分析依赖人工</text>
      <text x="88" y="480" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">投放、内容、私域各自执行</text>
      <text x="88" y="524" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">复盘常常晚于市场变化</text>
