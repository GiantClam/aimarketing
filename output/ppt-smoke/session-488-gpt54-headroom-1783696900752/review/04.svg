      <text x="888" y="332" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="700" fill="#1A202C">决策更可控</text>
      <line x1="888" y1="350" x2="1192" y2="350" stroke="#E2E8F0" stroke-width="1" />
      <text x="888" y="392" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">预算分配在一个视图追踪</text>
      <text x="888" y="436" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">活动节奏与客群策略同步</text>
      <text x="888" y="480" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">转化看板集中呈现投入产出</text>
      <text x="888" y="524" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#4A5568">高层可按变量快速纠偏</text>
      <path fill="#FFFFFF" stroke="#E2E8F0" d="M898,557 H1182 A10,10 0 0 1 1192,567 V589 A10,10 0 0 1 1182,599 H898 A10,10 0 0 1 888,589 V567 A10,10 0 0 1 898,557 Z" />
      <text x="1040" y="584" text-anchor="middle" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" fill="#4A5568">预算 · 节奏 · 客群 · 转化 同屏协同</text>
    </g>
    <g>
      <line x1="420" y1="430" x2="460" y2="430" stroke="#3182CE" stroke-width="2" />
      <line x1="820" y1="430" x2="860" y2="430" stroke="#63B3ED" stroke-width="2" />
