    </g>
    <g>
      <path fill="#F5F7FA" stroke="#E2E8F0" d="M876,238 H1204 A16,16 0 0 1 1220,254 V606 A16,16 0 0 1 1204,622 H876 A16,16 0 0 1 860,606 V254 A16,16 0 0 1 876,238 Z" />
      <path fill="#63B3ED" d="M876,238 H1204 A16,6 0 0 1 1220,244 V244 A16,6 0 0 1 1204,250 H876 A16,6 0 0 1 860,244 V244 A16,6 0 0 1 876,238 Z" />
