    <text x="88" y="168" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="700" fill="#1A365D">企业AI营销工作台的价值，不是再加一个工具，而是把营销决策链条收拢到同一控制面。</text>
    <path fill="#3182CE" d="M90.50,183 H361.50 A2.50,2.50 0 0 1 364,185.50 V185.50 A2.50,2.50 0 0 1 361.50,188 H90.50 A2.50,2.50 0 0 1 88,185.50 V185.50 A2.50,2.50 0 0 1 90.50,183 Z" />
    <g>
