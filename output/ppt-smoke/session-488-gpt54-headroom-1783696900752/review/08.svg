<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A365D" />
      <stop offset="100%" stop-color="#3182CE" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3182CE" />
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="720" fill="#3182CE" fill-opacity="0.03" />
    <line x1="60" y1="96" x2="1220" y2="96" stroke="#3182CE" stroke-width="2" />
    <line x1="60" y1="672" x2="1220" y2="672" stroke="#E2E8F0" stroke-width="1" />
    <line x1="906" y1="132" x2="906" y2="620" stroke="#E2E8F0" stroke-width="1" />
  </g>

  <g id="chrome">
    <text x="60" y="52" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" letter-spacing="0">推进序列</text>
    <text x="60" y="84" fill="url(#titleGradient)" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="36" font-weight="700" letter-spacing="0">建议先试点再放大</text>
    <text x="60" y="136" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" letter-spacing="0">建议以单业务线和明确转化目标启动8-12周试点，在不改变核心业务系统的前提下验证价值。</text>
    <text x="60" y="695" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11">企业 AI 营销工作台</text>
    <text x="1212" y="695" text-anchor="end" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11">08</text>
  </g>

  <g id="content">
    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M72,180 H866 A12,12 0 0 1 878,192 V264 A12,12 0 0 1 866,276 H72 A12,12 0 0 1 60,264 V192 A12,12 0 0 1 72,180 Z" />
    <circle cx="98" cy="214" r="12" fill="#3182CE" />
    <text x="98" y="219" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="14" font-weight="700">1</text>
    <text x="124" y="220" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="700">锁定试点范围</text>
    <text x="124" y="248" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">优先选择线索量稳定、渠道较多、复盘痛点明显的业务线</text>

    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M72,298 H866 A12,12 0 0 1 878,310 V382 A12,12 0 0 1 866,394 H72 A12,12 0 0 1 60,382 V310 A12,12 0 0 1 72,298 Z" />
    <circle cx="98" cy="332" r="12" fill="#3182CE" />
    <text x="98" y="337" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="14" font-weight="700">2</text>
    <text x="124" y="338" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="700">定义成功标准</text>
    <text x="124" y="366" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">在启动前锁定复盘时效、策略更新频率、线索转化率与投放调整效率</text>

    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M72,416 H866 A12,12 0 0 1 878,428 V500 A12,12 0 0 1 866,512 H72 A12,12 0 0 1 60,500 V428 A12,12 0 0 1 72,416 Z" />
    <circle cx="98" cy="450" r="12" fill="#3182CE" />
    <text x="98" y="455" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="14" font-weight="700">3</text>
    <text x="124" y="456" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="700">搭建四模块闭环</text>
    <text x="124" y="484" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">同步覆盖数据整合、AI 分析、自动化执行、效果度量</text>

    <path fill="#1A365D" fill-opacity="0.04" stroke="#3182CE" stroke-width="1.5" d="M72,534 H866 A12,12 0 0 1 878,546 V618 A12,12 0 0 1 866,630 H72 A12,12 0 0 1 60,618 V546 A12,12 0 0 1 72,534 Z" />
    <circle cx="98" cy="568" r="12" fill="#1A365D" />
    <text x="98" y="573" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="14" font-weight="700">4</text>
    <text x="124" y="574" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="700">进入共创与数据梳理</text>
    <text x="124" y="602" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">明确接口清单、试点人群、自动化场景与管理驾驶舱口径</text>

    <line x1="470" y1="276" x2="470" y2="298" stroke="#3182CE" stroke-width="2.5" marker-end="url(#arrowBlue)" />
    <line x1="470" y1="394" x2="470" y2="416" stroke="#3182CE" stroke-width="2.5" marker-end="url(#arrowBlue)" />
    <line x1="470" y1="512" x2="470" y2="534" stroke="#3182CE" stroke-width="2.5" marker-end="url(#arrowBlue)" />

    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M950,180 H1208 A12,12 0 0 1 1220,192 V300 A12,12 0 0 1 1208,312 H950 A12,12 0 0 1 938,300 V192 A12,12 0 0 1 950,180 Z" />
    <text x="962" y="214" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700">试点判断</text>
    <text x="962" y="248" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="700">先验证闭环</text>
    <text x="962" y="278" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">确认数据可联通、</text>
    <text x="962" y="304" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">策略可执行、结果可归因</text>

    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M950,334 H1208 A12,12 0 0 1 1220,346 V454 A12,12 0 0 1 1208,466 H950 A12,12 0 0 1 938,454 V346 A12,12 0 0 1 950,334 Z" />
    <text x="962" y="368" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700">规模判断</text>
    <text x="962" y="402" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="700">再决定投入</text>
    <text x="962" y="432" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">把预算、流程与组织</text>
    <text x="962" y="458" fill="#4A5568" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">扩展到更多业务线</text>

    <path fill="#EBF4FB" stroke="#3182CE" stroke-width="1" d="M950,488 H1208 A12,12 0 0 1 1220,500 V618 A12,12 0 0 1 1208,630 H950 A12,12 0 0 1 938,618 V500 A12,12 0 0 1 950,488 Z" />
    <text x="962" y="522" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700">关键风险</text>
    <text x="962" y="552" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">数据口径不统一</text>
    <text x="962" y="578" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">流程不标准</text>
    <text x="962" y="604" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18">组织协同不足</text>
  </g>

  <g id="annotations">
    <path fill="#EBF4FB" d="M70,640 H440 A10,10 0 0 1 450,650 V650 A10,10 0 0 1 440,660 H70 A10,10 0 0 1 60,650 V650 A10,10 0 0 1 70,640 Z" />
    <text x="78" y="654" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14">试点成功标准要在启动前锁定</text>

    <path fill="#EBF4FB" d="M472,640 H746 A10,10 0 0 1 756,650 V650 A10,10 0 0 1 746,660 H472 A10,10 0 0 1 462,650 V650 A10,10 0 0 1 472,640 Z" />
    <text x="480" y="654" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14">先验证闭环，再决定规模化投入</text>

    <path fill="#EBF4FB" d="M778,640 H908 A10,10 0 0 1 918,650 V650 A10,10 0 0 1 908,660 H778 A10,10 0 0 1 768,650 V650 A10,10 0 0 1 778,640 Z" />
    <text x="786" y="654" fill="#1A365D" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14">收束判断</text>
  </g>
</svg>