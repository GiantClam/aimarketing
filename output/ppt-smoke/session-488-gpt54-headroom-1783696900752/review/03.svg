<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D" />
      <stop offset="100%" stop-color="#3182CE" />
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EBF4FB" />
      <stop offset="100%" stop-color="#F5F7FA" />
    </linearGradient>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
    <rect x="770" y="0" width="510" height="720" fill="#F5F7FA" />
    <circle cx="1060" cy="140" r="220" fill="#3182CE" fill-opacity="0.08" />
    <circle cx="1130" cy="590" r="180" fill="#63B3ED" fill-opacity="0.08" />
    <line x1="0" y1="92" x2="1280" y2="92" stroke="#E2E8F0" stroke-width="1" />
    <line x1="770" y1="92" x2="770" y2="720" stroke="#E2E8F0" stroke-width="1" />
  </g>

  <g id="chrome">
    <text x="60" y="54" fill="#3182CE" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700" letter-spacing="0">关键判断</text>
    <line x1="60" y1="72" x2="180" y2="72" stroke="#3182CE" stroke-width="3" />
    <text x="1120" y="54" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" text-anchor="end">企业 AI 营销工作台</text>
    <text x="1220" y="54" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" text-anchor="end">03</text>
  </g>

  <g id="content">
    <text x="60" y="150" fill="url(#titleGradient)" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="44" font-weight="700" letter-spacing="0">先做统一，再做智能</text>

    <path fill="url(#panelGlow)" stroke="#E2E8F0" stroke-width="1.5" d="M72,192 H708 A12,12 0 0 1 720,204 V446 A12,12 0 0 1 708,458 H72 A12,12 0 0 1 60,446 V204 A12,12 0 0 1 72,192 Z" />
    <rect x="60" y="192" width="10" height="266" fill="#3182CE" />
    <text font-weight="400" fill="#1A202C" letter-spacing="0" font-size="29" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="100" y="266">多数企业营销问题并不缺工具，而是数据、决策和</text><text font-weight="400" fill="#1A202C" letter-spacing="0" font-size="29" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="100" y="310">执行分散在不同系统里，导致预算投下去却很难</text><text font-weight="400" fill="#1A202C" letter-spacing="0" font-size="29" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="100" y="354">形成持续优化。</text><path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" d="M830,128 H1204 A16,16 0 0 1 1220,144 V516 A16,16 0 0 1 1204,532 H830 A16,16 0 0 1 814,516 V144 A16,16 0 0 1 830,128 Z" />
    <text x="848" y="176" fill="#1A365D" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="26" font-weight="700" letter-spacing="0">现状信号</text>

    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M858,214 H1176 A10,10 0 0 1 1186,224 V286 A10,10 0 0 1 1176,296 H858 A10,10 0 0 1 848,286 V224 A10,10 0 0 1 858,214 Z" />
    <circle cx="878" cy="255" r="14" fill="#EBF4FB" stroke="#3182CE" stroke-width="2" />
    <circle cx="878" cy="255" r="4" fill="#3182CE" />
    <text x="908" y="246" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">数据散在 CRM、广告、私域</text>
    <text x="908" y="272" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">与内容平台</text>

    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M858,316 H1176 A10,10 0 0 1 1186,326 V388 A10,10 0 0 1 1176,398 H858 A10,10 0 0 1 848,388 V326 A10,10 0 0 1 858,316 Z" />
    <circle cx="878" cy="357" r="14" fill="#EBF4FB" stroke="#3182CE" stroke-width="2" />
    <path d="M872 357 L876 361 L885 352" fill="none" stroke="#3182CE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="908" y="348" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">策略依赖人工汇总，响应</text>
    <text x="908" y="374" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">速度慢</text>

    <path fill="#F5F7FA" stroke="#E2E8F0" stroke-width="1" d="M858,418 H1176 A10,10 0 0 1 1186,428 V490 A10,10 0 0 1 1176,500 H858 A10,10 0 0 1 848,490 V428 A10,10 0 0 1 858,418 Z" />
    <circle cx="878" cy="459" r="14" fill="#EBF4FB" stroke="#3182CE" stroke-width="2" />
    <path d="M878 449 L878 459 L885 466" fill="none" stroke="#3182CE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="908" y="450" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">结果复盘晚，预算调整常常</text>
    <text x="908" y="476" fill="#1A202C" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700">滞后一周以上</text>

    <path fill="#1A365D" d="M74,514 H1206 A14,14 0 0 1 1220,528 V626 A14,14 0 0 1 1206,640 H74 A14,14 0 0 1 60,626 V528 A14,14 0 0 1 74,514 Z" />
    <text x="102" y="565" fill="#63B3ED" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="40" font-weight="700">1</text>
    <text x="148" y="566" fill="#FFFFFF" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="26" font-weight="700">平台建设顺序</text>
    <text x="148" y="606" fill="#FFFFFF" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24">先打通数据与流程，再把 AI 放进分析和执行闭环。</text>
  </g>

  <g id="annotations">
    <line x1="720" y1="325" x2="786" y2="325" stroke="#3182CE" stroke-width="2" />
    <circle cx="786" cy="325" r="5" fill="#3182CE" />
    <line x1="720" y1="384" x2="786" y2="384" stroke="#3182CE" stroke-width="2" stroke-dasharray="5 5" />
    <circle cx="786" cy="384" r="5" fill="#3182CE" />
    <line x1="720" y1="443" x2="786" y2="443" stroke="#3182CE" stroke-width="2" />
    <circle cx="786" cy="443" r="5" fill="#3182CE" />
    <text x="808" y="581" fill="#A0AEC0" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14">统一是 AI 营销工作台的前提层</text>
  </g>
</svg>