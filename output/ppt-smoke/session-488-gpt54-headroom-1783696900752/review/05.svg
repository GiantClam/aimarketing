    <text x="96" y="402" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="26" font-weight="700" fill="#1A365D">数据整合</text>
    <text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="96" y="434">统一汇聚客户、渠道、</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="96" y="462">内容与交易数据后，</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="96" y="490">管理层首次能在同一</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="96" y="518">视图判断线索质量、</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="96" y="546">活动效果与预算去向。</text><text x="362" y="402" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="26" font-weight="700" fill="#1A365D">AI 分析</text>
    <text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="362" y="434">平台自动识别高潜客群、</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="362" y="462">异常波动、流失征兆与</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="362" y="490">内容表现，让运营从</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="362" y="518">被动看报表变成主动</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="362" y="546">收任务。</text><text x="628" y="402" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="26" font-weight="700" fill="#1A365D">自动化执行</text>
    <text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="628" y="434">基于规则与模型建议，</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="628" y="462">可自动触发分群、内容</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="628" y="490">分发、线索跟进与预算</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="628" y="518">微调，缩短执行链条。</text><text x="894" y="402" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="26" font-weight="700" fill="#1A365D">效果度量</text>
    <text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="894" y="434">从活动结果扩展到人群、</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="894" y="462">渠道、素材、动作四层</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="894" y="490">归因，帮助团队知道</text><text fill="#4A5568" font-size="18" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="894" y="518">哪些动作真正带来转化。</text><line x1="201" y1="584" x2="999" y2="584" stroke="#3182CE" stroke-width="3" marker-end="url(#arrowBlue)" />
