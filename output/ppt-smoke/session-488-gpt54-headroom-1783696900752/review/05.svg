  <g id="content">
    <text fill="#1A202C" font-size="20" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" x="60" y="142">这类平台最先产生价值的地方，通常不是模型精度本身，而是缩短从发现问题到执行动作的时间。</text><path fill="#FFFFFF" stroke="#E2E8F0" d="M70,198 H410 A10,10 0 0 1 420,208 V252 A10,10 0 0 1 410,262 H70 A10,10 0 0 1 60,252 V208 A10,10 0 0 1 70,198 Z" />
    <path fill="#FFFFFF" stroke="#E2E8F0" d="M458,198 H802 A10,10 0 0 1 812,208 V252 A10,10 0 0 1 802,262 H458 A10,10 0 0 1 448,252 V208 A10,10 0 0 1 458,198 Z" />
    <path fill="#FFFFFF" stroke="#E2E8F0" d="M850,198 H1210 A10,10 0 0 1 1220,208 V252 A10,10 0 0 1 1210,262 H850 A10,10 0 0 1 840,252 V208 A10,10 0 0 1 850,198 Z" />

    <circle cx="92" cy="230" r="8" fill="#3182CE" />
    <text x="112" y="236" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#1A202C">减少跨团队来回确认</text>

    <circle cx="480" cy="230" r="8" fill="#3182CE" />
    <text x="500" y="236" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#1A202C">提升策略更新频率</text>

    <circle cx="872" cy="230" r="8" fill="#3182CE" />
    <text x="892" y="236" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#1A202C">让复盘进入日常经营</text>

    <path fill="#FFFFFF" stroke="#E2E8F0" d="M88,302 H314 A12,12 0 0 1 326,314 V556 A12,12 0 0 1 314,568 H88 A12,12 0 0 1 76,556 V314 A12,12 0 0 1 88,302 Z" />
