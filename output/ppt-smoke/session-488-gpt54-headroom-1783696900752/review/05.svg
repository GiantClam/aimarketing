    <circle cx="467" cy="584" r="6" fill="#3182CE" />
    <circle cx="733" cy="584" r="6" fill="#3182CE" />
    <circle cx="999" cy="584" r="6" fill="#3182CE" />

    <path fill="#1A365D" d="M468,594 H812 A20,20 0 0 1 832,614 V614 A20,20 0 0 1 812,634 H468 A20,20 0 0 1 448,614 V614 A20,20 0 0 1 468,594 Z" />
    <text x="640" y="620" text-anchor="middle" font-family="Arial, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#FFFFFF">发现问题 → 判断优先级 → 触发动作 → 持续复盘</text>
