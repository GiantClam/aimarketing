    <path fill="#F5F7FA" stroke="#E2E8F0" d="M70,488 H486 A10,10 0 0 1 496,498 V530 A10,10 0 0 1 486,540 H70 A10,10 0 0 1 60,530 V498 A10,10 0 0 1 70,488 Z" />
