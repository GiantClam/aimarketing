    <text x="60" y="196" fill="url(#titleGradient)" font-family="Georgia, Microsoft YaHei, serif" font-size="64" font-weight="700">企业AI营销工作台</text>

    <text fill="#1A202C" font-size="22" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="64" y="268">用一个统一工作台打通数据整合、AI分析、自动化执行与效果度量，</text><text fill="#1A202C" font-size="22" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="64" y="302">把营销从多系统协同改为可度量的增长运营。</text><path fill="#F5F7FA" stroke="#E2E8F0" d="M70,352 H486 A10,10 0 0 1 496,362 V394 A10,10 0 0 1 486,404 H70 A10,10 0 0 1 60,394 V362 A10,10 0 0 1 70,352 Z" />
