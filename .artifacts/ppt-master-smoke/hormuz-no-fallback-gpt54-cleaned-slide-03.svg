<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#111111"/>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#111111"/>
    <rect x="44" y="42" width="1192" height="636" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="44" y="42" width="18" height="636" fill="#E85D26"/>
    <line x1="90" y1="212" x2="1236" y2="212" stroke="#282826" stroke-width="2"/>
    <line x1="826" y1="212" x2="826" y2="678" stroke="#282826" stroke-width="2"/>
    <line x1="90" y1="502" x2="1236" y2="502" stroke="#282826" stroke-width="2"/>
    <rect x="892" y="82" width="282" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="94" y="544" width="338" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="454" y="544" width="338" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="844" y="544" width="338" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
  </g>

  <g id="chrome">
    <text x="92" y="86" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="3">核心宣言</text>
    <text x="1098" y="86" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="end">03 / 04</text>
    <text x="1098" y="112" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" text-anchor="end" opacity="0.72">霍尔木兹海峡现状与全球能源运输影响</text>
    <text x="906" y="115" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900">OPEN</text>
    <text x="906" y="153" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">≠ STABLE</text>
  </g>

  <g id="content">
    <text x="92" y="178" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="74" font-weight="900" letter-spacing="0.5">船能过，</text>
    <text x="92" y="258" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="74" font-weight="900" letter-spacing="0.5">不等于链已稳</text>

    <text x="92" y="336" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">当前最重要的结论不是海峡有没有打开，</text>
    <text x="92" y="374" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">而是风险溢价、恢复节奏与高费用是否固化。</text>

    <text x="92" y="466" fill="#E85D26" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="156" font-weight="900">≠</text>
    <text x="260" y="430" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">通航恢复</text>
    <text x="260" y="474" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">只是第一层信号</text>

    <text x="856" y="276" fill="#E85D26" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="128" font-weight="900">3</text>
    <text x="962" y="276" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">个直接判断</text>

    <text x="856" y="340" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">01</text>
    <text x="904" y="340" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">任何扣船、摩擦</text>
    <text x="904" y="370" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">或临时封控，都能迅速推高溢价</text>

    <text x="856" y="424" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">02</text>
    <text x="904" y="424" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">航运恢复并不等于</text>
    <text x="904" y="454" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">供给链恢复到冲突前状态</text>

    <text x="856" y="508" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">03</text>
    <text x="904" y="508" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">若高费用固化，能源进口方</text>
    <text x="904" y="538" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">将长期承受成本挤压</text>

    <text x="114" y="575" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">信号一</text>
    <text x="114" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">“能走船”</text>
    <text x="268" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">不等于风险已回落</text>

    <text x="474" y="575" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">信号二</text>
    <text x="474" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">“有航次”</text>
    <text x="628" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">不等于节奏已稳定</text>

    <text x="864" y="575" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">信号三</text>
    <text x="864" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">“有供给”</text>
    <text x="1018" y="606" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400">不等于成本可控</text>
  </g>

  <g id="annotations">
    <line x1="780" y1="144" x2="860" y2="144" stroke="#E85D26" stroke-width="3"/>
    <line x1="782" y1="314" x2="826" y2="314" stroke="#E85D26" stroke-width="3"/>
    <line x1="782" y1="398" x2="826" y2="398" stroke="#E85D26" stroke-width="3"/>
    <line x1="782" y1="482" x2="826" y2="482" stroke="#E85D26" stroke-width="3"/>
    <text x="92" y="694" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" opacity="0.62">判断重点已从“是否重开”转向“高成本是否留下来”。</text>
  </g>
</svg>