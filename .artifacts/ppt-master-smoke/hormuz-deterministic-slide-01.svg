<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><g id="background"><rect width="1280" height="720" fill="#111111" /><path fill="#1A1A18" fill-opacity="0.72" d="M100,72 H1180 A26,26 0 0 1 1206,98 V612 A26,26 0 0 1 1180,638 H100 A26,26 0 0 1 74,612 V98 A26,26 0 0 1 100,72 Z" /><path fill="none" stroke="#282826" stroke-width="2" d="M100,72 H1180 A26,26 0 0 1 1206,98 V612 A26,26 0 0 1 1180,638 H100 A26,26 0 0 1 74,612 V98 A26,26 0 0 1 100,72 Z" /><circle cx="1084" cy="124" r="64" fill="#E85D26" fill-opacity="0.14" /><rect x="138" y="104" width="216" height="10" fill="#E85D26" fill-opacity="0.85" /></g><g id="chrome"><text x="1060" y="90" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="14" font-weight="700" fill="#F0ECE5" opacity="0.7">BROADSIDE</text></g><g id="content"><text x="136" y="120" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="16" font-weight="700" fill="#E85D26">大字报头</text><text fill="#F0ECE5" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-weight="800" font-size="42" x="136" y="200">霍尔木兹海峡：恢复不等于</text><text fill="#F0ECE5" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-weight="800" font-size="42" x="136" y="250">脱险</text><text fill="#F0ECE5" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-weight="400" font-size="20" x="136" y="350">船流正在回升，但安全、成本与控制权仍未定型；对管理层</text><text fill="#F0ECE5" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-weight="400" font-size="20" x="136" y="378">而言，这不是恢复通关的消息，而…</text><g id="bullet-452"><circle cx="146" cy="446" r="4" fill="#F0ECE5" /><text x="162" y="452" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="400" fill="#F0ECE5">通行恢复，但节奏反复</text></g><g id="bullet-488"><circle cx="146" cy="482" r="4" fill="#F0ECE5" /><text x="162" y="488" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="400" fill="#F0ECE5">运价飙升，保险高压</text></g><g id="bullet-524"><circle cx="146" cy="518" r="4" fill="#F0ECE5" /><text x="162" y="524" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="18" font-weight="400" fill="#F0ECE5">决策窗口已提前</text></g><path fill="#E85D26" fill-opacity="0.18" d="M928,148 H1092 A28,28 0 0 1 1120,176 V340 A28,28 0 0 1 1092,368 H928 A28,28 0 0 1 900,340 V176 A28,28 0 0 1 928,148 Z" /><path fill="#1A1A18" stroke="#282826" stroke-width="2" d="M992,390 H1094 A24,24 0 0 1 1118,414 V516 A24,24 0 0 1 1094,540 H992 A24,24 0 0 1 968,516 V414 A24,24 0 0 1 992,390 Z" /></g><g id="annotations"><text x="1120" y="674" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="12" fill="#F0ECE5" opacity="0.55">1/4</text></g></svg>