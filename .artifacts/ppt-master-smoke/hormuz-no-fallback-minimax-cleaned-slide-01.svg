<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#C44A1C"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A18"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  
  <g id="background">
    <rect width="1280" height="720" fill="#111111"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#panelGrad)" fill-opacity="0.3"/>
    <polygon points="0,720 0,600 200,720" fill="#1A1A18"/>
    <polygon points="1280,0 1280,120 1080,0" fill="#1A1A18"/>
    <line x1="0" y1="720" x2="1280" y2="0" stroke="#282826" stroke-width="2"/>
    <line x1="0" y1="680" x2="1280" y2="40" stroke="#282826" stroke-width="1"/>
  </g>
  
  <g id="chrome">
    <rect x="60" y="50" width="8" height="60" fill="#E85D26"/>
    <text x="80" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#E85D26" letter-spacing="8">大字报头</text>
    <line x1="80" y1="110" x2="400" y2="110" stroke="#E85D26" stroke-width="2"/>
  </g>
  
  <g id="content">
    <text x="80" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F0ECE5">霍尔木兹：</text>
    <text x="80" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F0ECE5">通航恢复</text>
    <text x="570" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#E85D26">≠</text>
    <text x="650" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F0ECE5">风险消散</text>
    
    <rect x="80" y="340" width="600" height="3" fill="url(#accentGrad)"/>
    
    <text x="80" y="400" font-family="Arial, sans-serif" font-size="22" fill="#F0ECE5" fill-opacity="0.8">截至2026年6月24日，霍尔木兹海峡重启通航，</text>
    <text x="80" y="430" font-family="Arial, sans-serif" font-size="22" fill="#F0ECE5" fill-opacity="0.8">但安全形势、费用机制与控制权安排仍存在结构性分歧。</text>
  </g>
  
  <g id="annotations">
    <g>
      <rect x="80" y="480" width="340" height="90" fill="#1A1A18" stroke="#282826" stroke-width="1"/>
      <text x="100" y="510" font-family="Arial, sans-serif" font-size="14" fill="#E85D26">⚡ 关键警示</text>
      <text x="100" y="535" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5">重启通航≠稳定通航</text>
      <text x="100" y="558" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5" fill-opacity="0.7">安全机制尚待重建</text>
    </g>
    
    <g>
      <rect x="440" y="480" width="340" height="90" fill="#1A1A18" stroke="#282826" stroke-width="1"/>
      <text x="460" y="510" font-family="Arial, sans-serif" font-size="14" fill="#E85D26">⚡ 关键警示</text>
      <text x="460" y="535" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5">航运恢复≠供应链恢复</text>
      <text x="460" y="558" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5" fill-opacity="0.7">成本与合规压力并存</text>
    </g>
    
    <g>
      <rect x="800" y="480" width="340" height="90" fill="#1A1A18" stroke="#282826" stroke-width="1"/>
      <text x="820" y="510" font-family="Arial, sans-serif" font-size="14" fill="#E85D26">⚡ 时间节点</text>
      <text x="820" y="535" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5">截至2026年6月24日</text>
      <text x="820" y="558" font-family="Arial, sans-serif" font-size="16" fill="#F0ECE5" fill-opacity="0.7">风险溢价进入新常态</text>
    </g>
    
    <text x="80" y="650" font-family="Arial, sans-serif" font-size="14" fill="#F0ECE5" fill-opacity="0.5">Deck: 霍尔木兹海峡现状与全球能源运输影响</text>
    <text x="1200" y="650" font-family="Arial, sans-serif" font-size="14" fill="#F0ECE5" fill-opacity="0.5" text-anchor="end">1 / 4</text>
  </g>
  
  <g id="visual-element">
    <circle cx="1100" cy="200" r="120" fill="none" stroke="#E85D26" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="1100" cy="200" r="90" fill="none" stroke="#E85D26" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="1100" cy="200" r="60" fill="none" stroke="#E85D26" stroke-width="3" stroke-opacity="0.7"/>
    <path d="M1040,200 L1160,200 M1100,140 L1100,260" stroke="#E85D26" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="1100" cy="200" r="8" fill="#E85D26"/>
  </g>
</svg>