<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F0F" />
      <stop offset="100%" stop-color="#161513" />
    </linearGradient>
    <radialGradient id="accentWash" cx="0.86" cy="0.22" r="0.58">
      <stop offset="0%" stop-color="#E85D26" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#E85D26" stop-opacity="0" />
    </radialGradient>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)" />
    <rect x="0" y="0" width="1280" height="720" fill="url(#accentWash)" />
    <rect x="0" y="0" width="18" height="720" fill="#E85D26" />
    <rect x="18" y="18" width="1244" height="684" fill="none" stroke="#282826" stroke-width="1" />
    <rect x="60" y="468" width="1160" height="204" fill="#141413" stroke="#282826" stroke-width="2" />
    <rect x="60" y="476" width="232" height="196" fill="#161615" />
    <rect x="292" y="476" width="232" height="196" fill="#1A1A18" />
    <rect x="524" y="476" width="232" height="196" fill="#161615" />
    <rect x="756" y="476" width="232" height="196" fill="#1A1A18" />
    <rect x="988" y="476" width="232" height="196" fill="#161615" />
  </g>

  <g id="chrome">
    <line x1="48" y1="52" x2="1232" y2="52" stroke="#282826" stroke-width="2" />
    <rect x="60" y="24" width="150" height="32" fill="#E85D26" />
    <text x="75" y="46" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="800">栏目排版</text>
    <text x="1220" y="46" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" text-anchor="end">02 / 04</text>

    <line x1="292" y1="476" x2="292" y2="672" stroke="#282826" stroke-width="2" />
    <line x1="524" y1="476" x2="524" y2="672" stroke="#282826" stroke-width="2" />
    <line x1="756" y1="476" x2="756" y2="672" stroke="#282826" stroke-width="2" />
    <line x1="988" y1="476" x2="988" y2="672" stroke="#282826" stroke-width="2" />
    <rect x="60" y="468" width="1160" height="8" fill="#E85D26" />
  </g>

  <g id="content">
    <text x="60" y="158" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="700" letter-spacing="2">本次只看</text>
    <text x="60" y="292" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="148" font-weight="900" letter-spacing="1">
      <tspan fill="#F0ECE5">五件</tspan>
      <tspan dx="18" fill="#E85D26">大事</tspan>
    </text>
    <rect x="60" y="306" width="580" height="10" fill="#E85D26" />

    <rect x="60" y="344" width="1160" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2" />
    <rect x="60" y="344" width="12" height="92" fill="#E85D26" />
    <text font-weight="600" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" x="86" y="384">这不是新闻复盘，而是一次关于利润、交付与</text><text font-weight="600" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" x="86" y="418">供应安全的管理层告示。</text><rect x="76" y="488" width="48" height="28" fill="#E85D26" />
    <text x="100" y="508" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" text-anchor="middle">01</text>
    <text font-weight="900" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="31" x="76" y="542">这不是</text><text font-weight="900" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="31" x="76" y="580">新闻复盘</text><text font-weight="600" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" x="76" y="620">利润、交付与</text><text font-weight="600" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" x="76" y="646">供应安全</text><rect x="308" y="488" width="48" height="28" fill="#E85D26" />
    <text x="332" y="508" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" text-anchor="middle">02</text>
    <text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="308" y="542">海峡恢复通航，</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="308" y="574">但安全与控制</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="308" y="606">安排仍未…</text><rect x="540" y="488" width="48" height="28" fill="#E85D26" />
    <text x="564" y="508" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" text-anchor="middle">03</text>
    <text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="540" y="542">核心问题不再是</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="540" y="574">封不封，而是</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="540" y="606">恢复能否…</text><rect x="772" y="488" width="48" height="28" fill="#E85D26" />
    <text x="796" y="508" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" text-anchor="middle">04</text>
    <text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="772" y="542">油轮、LNG船与</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="772" y="574">相关保险条款</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="772" y="606">仍高于…</text><rect x="1004" y="488" width="48" height="28" fill="#E85D26" />
    <text x="1028" y="508" fill="#111111" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="900" text-anchor="middle">05</text>
    <text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="1004" y="542">运价、战险与</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="1004" y="574">替代航线成本</text><text font-weight="800" fill="#F0ECE5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" x="1004" y="606">同步传导至…</text></g>

  <g id="annotations">
    <text x="900" y="282" fill="none" stroke="#E85D26" stroke-width="4" opacity="0.18" font-family="Noto Serif SC, Songti SC, STSong, serif" font-size="360" font-weight="700">五</text>

    <line x1="652" y1="311" x2="1030" y2="311" stroke="#E85D26" stroke-width="2" />

    <rect x="1038" y="236" width="172" height="78" fill="none" stroke="#E85D26" stroke-width="4" transform="rotate(-5 1124 275)" />
    <text x="1124" y="286" fill="#E85D26" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" text-anchor="middle" transform="rotate(-5 1124 275)">管理层告示</text>

    <line x1="106" y1="660" x2="1174" y2="660" stroke="#E85D26" stroke-width="3" />
    <rect x="101" y="655" width="10" height="10" fill="#E85D26" />
    <rect x="333" y="655" width="10" height="10" fill="#E85D26" />
    <rect x="565" y="655" width="10" height="10" fill="#E85D26" />
    <rect x="797" y="655" width="10" height="10" fill="#E85D26" />
    <rect x="1029" y="655" width="10" height="10" fill="#E85D26" />
    <rect x="1169" y="655" width="10" height="10" fill="#E85D26" />
  </g>
