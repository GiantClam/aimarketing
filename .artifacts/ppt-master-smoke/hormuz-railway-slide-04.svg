<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#111111"/>
  <g id="background">
    <rect x="24" y="24" width="1232" height="672" rx="0" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="44" y="44" width="1192" height="632" fill="#111111" stroke="#282826" stroke-width="1"/>
    <rect x="72" y="96" width="1136" height="2" fill="#E85D26"/>
    <rect x="72" y="620" width="1136" height="2" fill="#282826"/>
    <rect x="810" y="116" width="398" height="468" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="72" y="314" width="694" height="210" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
  </g>
  <g id="chrome">
    <text x="72" y="70" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="2">下一张告示</text>
    <text x="1208" y="70" text-anchor="end" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">04 / 04</text>
    <text x="72" y="652" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2">霍尔木兹海峡现状与全球能源运输影响（截至2026年6月24日）</text>
    <text x="1208" y="652" text-anchor="end" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.6">BROADSIDE</text>
  </g>
  <g id="content">
    <text x="72" y="180" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="92" font-weight="900" letter-spacing="-2">现在就要定案</text>
    <text x="78" y="236" fill="#E85D26" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="92" font-weight="900" letter-spacing="-2">现在就要定案</text>
    <text x="72" y="278" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="0.2">把霍尔木兹风险当作常态情景，而不是一次性冲击，决策顺序必须前移。</text>

    <rect x="72" y="314" width="694" height="56" fill="#E85D26"/>
    <text x="92" y="351" fill="#111111" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="30" font-weight="900" letter-spacing="1">决策时间线</text>

    <line x1="132" y1="438" x2="706" y2="438" stroke="#F0ECE5" stroke-width="4"/>
    <line x1="132" y1="438" x2="132" y2="472" stroke="#F0ECE5" stroke-width="4"/>
    <line x1="418" y1="438" x2="418" y2="472" stroke="#F0ECE5" stroke-width="4"/>
    <line x1="706" y1="438" x2="706" y2="472" stroke="#F0ECE5" stroke-width="4"/>

    <circle cx="132" cy="438" r="15" fill="#E85D26" stroke="#111111" stroke-width="4"/>
    <circle cx="418" cy="438" r="15" fill="#E85D26" stroke="#111111" stroke-width="4"/>
    <circle cx="706" cy="438" r="15" fill="#E85D26" stroke="#111111" stroke-width="4"/>

    <text x="132" y="404" text-anchor="middle" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="26" font-weight="900">先锁定</text>
    <text x="418" y="404" text-anchor="middle" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="26" font-weight="900">再前移</text>
    <text x="706" y="404" text-anchor="middle" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="26" font-weight="900">补冗余</text>

    <text x="132" y="506" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">关键船期</text>
    <text x="132" y="534" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">保险额度</text>

    <text x="418" y="506" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">采购批次</text>
    <text x="418" y="534" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">到港节奏</text>

    <text x="706" y="506" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">绕行航线</text>
    <text x="706" y="534" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">替代货源库存</text>

    <text x="838" y="166" fill="#E85D26" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="1">三项立即动作</text>

    <rect x="838" y="192" width="342" height="104" fill="none" stroke="#282826" stroke-width="1.5"/>
    <text x="860" y="228" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="24" font-weight="900">01</text>
    <text x="914" y="228" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">锁定关键船期</text>
    <text x="914" y="260" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">保险额度与高优先货盘</text>

    <rect x="838" y="312" width="342" height="104" fill="none" stroke="#282826" stroke-width="1.5"/>
    <text x="860" y="348" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="24" font-weight="900">02</text>
    <text x="914" y="348" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">调整采购批次</text>
    <text x="914" y="380" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">与到港节奏前移准备</text>

    <rect x="838" y="432" width="342" height="104" fill="none" stroke="#282826" stroke-width="1.5"/>
    <text x="860" y="468" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="24" font-weight="900">03</text>
    <text x="914" y="468" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">建立绕行航线</text>
    <text x="914" y="500" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">替代货源与库存缓冲</text>

    <rect x="838" y="558" width="342" height="68" fill="#E85D26"/>
    <text x="859" y="601" fill="#111111" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="30" font-weight="900" letter-spacing="0.5">把风险当常态</text>
  </g>
  <g id="annotations">
    <rect x="72" y="576" width="694" height="58" fill="none" stroke="#E85D26" stroke-width="2"/>
    <text x="92" y="613" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="0.4">结论：先排顺序，再赌恢复；晚一天，成本与被动都会放大。</text>
  </g>
</svg>