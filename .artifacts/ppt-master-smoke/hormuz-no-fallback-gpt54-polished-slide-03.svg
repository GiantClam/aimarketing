<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#111111"/>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#111111"/>
    <rect x="56" y="56" width="1168" height="608" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="0" y="0" width="18" height="720" fill="#E85D26"/>
    <rect x="1224" y="0" width="56" height="720" fill="#1A1A18"/>
    <line x1="56" y1="168" x2="1224" y2="168" stroke="#282826" stroke-width="2"/>
    <line x1="56" y1="520" x2="1224" y2="520" stroke="#282826" stroke-width="2"/>
    <line x1="820" y1="168" x2="820" y2="664" stroke="#282826" stroke-width="2"/>
  </g>
  <g id="chrome">
    <text x="72" y="94" fill="#E85D26" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="3">核心宣言</text>
    <text x="1114" y="94" fill="#F0ECE5" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="end" letter-spacing="2">03 / 04</text>
    <text x="1114" y="642" fill="#6F6A63" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="end" letter-spacing="2">HOR</text>
    <text x="1170" y="642" fill="#6F6A63" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="end" letter-spacing="2">MUZ</text>
  </g>
  <g id="content">
    <text x="74" y="242" fill="#F0ECE5" font-size="78" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="-1">断航风险缓了，</text>
    <text x="74" y="324" fill="#E85D26" font-size="90" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="-2">成本风险坐实了</text>
    <text x="74" y="390" fill="#F0ECE5" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="500" letter-spacing="0.5">霍尔木兹海峡的当下结论很明确：物理通道恢复，不代表…</text>

    <rect x="850" y="196" width="322" height="188" fill="#1A1A18" stroke="#E85D26" stroke-width="2"/>
    <text x="876" y="250" fill="#6F6A63" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">主判断</text>
    <text x="876" y="316" fill="#F0ECE5" font-size="104" font-family="Arial, Helvetica, sans-serif" font-weight="900">20%</text>
    <text x="876" y="352" fill="#E85D26" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">全球约五分之一海运原油</text>

    <rect x="56" y="548" width="360" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <text x="80" y="580" fill="#E85D26" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">数字信号</text>
    <text x="80" y="614" fill="#F0ECE5" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">全球约20%…</text>

    <rect x="438" y="548" width="360" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <text x="462" y="580" fill="#E85D26" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">风险链条</text>
    <text x="462" y="614" fill="#F0ECE5" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">新的军事摩擦…</text>

    <rect x="820" y="548" width="360" height="92" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <text x="844" y="580" fill="#E85D26" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">经营含义</text>
    <text x="844" y="614" fill="#F0ECE5" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">库存会更保守…</text>
  </g>
  <g id="annotations">
    <line x1="850" y1="410" x2="1172" y2="410" stroke="#282826" stroke-width="2"/>
    <text x="850" y="438" fill="#6F6A63" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1">恢复的是通行能力，不是风险定价。</text>
    <line x1="74" y1="420" x2="334" y2="420" stroke="#E85D26" stroke-width="6"/>
    <text x="74" y="460" fill="#6F6A63" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1">判读重心已经从“会不会封”转向“成本会抬多久”。</text>
  </g>
</svg>