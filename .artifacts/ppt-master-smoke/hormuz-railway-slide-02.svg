<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#111111"/>
  <g id="background">
    <rect x="28" y="28" width="1224" height="664" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="44" y="44" width="1192" height="632" fill="#111111" stroke="#282826" stroke-width="1"/>
    <line x1="426" y1="44" x2="426" y2="676" stroke="#282826" stroke-width="2"/>
    <line x1="828" y1="44" x2="828" y2="676" stroke="#282826" stroke-width="2"/>
    <line x1="44" y1="168" x2="1236" y2="168" stroke="#282826" stroke-width="2"/>
    <line x1="44" y1="560" x2="1236" y2="560" stroke="#282826" stroke-width="2"/>
  </g>
  <g id="chrome">
    <text x="56" y="92" fill="#E85D26" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="3">栏目排版</text>
    <text x="1058" y="92" fill="#F0ECE5" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">02 / 04</text>
    <text x="56" y="648" fill="#F0ECE5" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">霍尔木兹海峡现状与全球能源运输影响（截至2026年6月24日）</text>
    <line x1="56" y1="110" x2="186" y2="110" stroke="#E85D26" stroke-width="5"/>
    <rect x="1102" y="610" width="118" height="42" fill="#E85D26"/>
    <text x="1161" y="638" text-anchor="middle" fill="#111111" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="2">AGENDA</text>
  </g>
  <g id="content">
    <text x="56" y="152" fill="#F0ECE5" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="1">先看三件大事</text>
    <text x="56" y="214" fill="#F0ECE5" font-size="25" font-family="Arial, Helvetica, sans-serif" font-weight="500" letter-spacing="0.5">这不是单点通航问题，而是航道、价格与供应韧性的联动考题。</text>

    <rect x="56" y="250" width="338" height="286" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <text x="74" y="304" fill="#E85D26" font-size="84" font-family="Arial, Helvetica, sans-serif" font-weight="900">01</text>
    <line x1="74" y1="324" x2="376" y2="324" stroke="#E85D26" stroke-width="3"/>
    <text x="74" y="378" fill="#F0ECE5" font-size="36" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">过峡船舶回升</text>
    <text x="74" y="422" fill="#F0ECE5" font-size="36" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">市场情绪暂缓失速</text>
    <text x="74" y="482" fill="#F0ECE5" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="600" letter-spacing="1.5">先看流量恢复，不等于风险出清</text>

    <rect x="458" y="208" width="338" height="328" fill="#F0ECE5"/>
    <text x="476" y="268" fill="#111111" font-size="84" font-family="Arial, Helvetica, sans-serif" font-weight="900">02</text>
    <line x1="476" y1="288" x2="778" y2="288" stroke="#E85D26" stroke-width="4"/>
    <text x="476" y="344" fill="#111111" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="1">航道控制、收费与</text>
    <text x="476" y="386" fill="#111111" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="1">安全预期仍摇摆</text>
    <text x="476" y="446" fill="#111111" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.2">真正拖住市场的，是规则与预期反复变动</text>
    <rect x="476" y="470" width="122" height="28" fill="#E85D26"/>
    <text x="537" y="490" text-anchor="middle" fill="#111111" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="2">CONTROL</text>

    <rect x="860" y="250" width="338" height="286" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <text x="878" y="304" fill="#E85D26" font-size="84" font-family="Arial, Helvetica, sans-serif" font-weight="900">03</text>
    <line x1="878" y1="324" x2="1180" y2="324" stroke="#E85D26" stroke-width="3"/>
    <text x="878" y="378" fill="#F0ECE5" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">租船与战争险把每一船货</text>
    <text x="878" y="420" fill="#F0ECE5" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="1">重新定价</text>
    <text x="878" y="482" fill="#F0ECE5" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="600" letter-spacing="1.3">价格修复慢于流量修复</text>

    <rect x="56" y="584" width="1142" height="68" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="56" y="584" width="14" height="68" fill="#E85D26"/>
    <text x="92" y="626" fill="#F0ECE5" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="1">04</text>
    <text x="154" y="626" fill="#F0ECE5" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="0.8">进口国同步承受船期、现金流与库存压力</text>

    <line x1="225" y1="536" x2="225" y2="584" stroke="#E85D26" stroke-width="3"/>
    <line x1="627" y1="536" x2="627" y2="584" stroke="#E85D26" stroke-width="3"/>
    <line x1="1029" y1="536" x2="1029" y2="584" stroke="#E85D26" stroke-width="3"/>
  </g>
  <g id="annotations">
    <text x="1074" y="142" fill="#E85D26" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="2">三件大事</text>
    <text x="1074" y="170" fill="#F0ECE5" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="600" letter-spacing="1">外加一项落地压力</text>
    <line x1="1046" y1="136" x2="1046" y2="176" stroke="#E85D26" stroke-width="4"/>
    <text x="870" y="92" fill="#F0ECE5" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.5">恢复 ≠ 回归常态</text>
  </g>
</svg>