<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#111111"/>
  <g id="background">
    <rect x="22" y="22" width="1236" height="676" rx="0" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="44" y="44" width="1192" height="632" fill="#111111" stroke="#282826" stroke-width="1"/>
    <rect x="66" y="108" width="734" height="470" fill="#F0ECE5"/>
    <rect x="818" y="108" width="396" height="470" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <rect x="66" y="596" width="1148" height="56" fill="#1A1A18" stroke="#282826" stroke-width="2"/>
    <line x1="66" y1="90" x2="1214" y2="90" stroke="#E85D26" stroke-width="4"/>
  </g>

  <g id="chrome">
    <text x="66" y="66" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">核心宣言</text>
    <text x="1214" y="66" text-anchor="end" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5">03 / 04</text>
    <rect x="1086" y="607" width="128" height="34" fill="#E85D26"/>
    <text x="1150" y="630" text-anchor="middle" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" letter-spacing="1.2">恢复≠修复</text>
  </g>

  <g id="content">
    <text x="98" y="182" fill="#111111" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="82" font-weight="900" letter-spacing="-2">海峡恢复，</text>
    <text x="98" y="274" fill="#111111" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="82" font-weight="900" letter-spacing="-2">不等于</text>
    <rect x="98" y="300" width="484" height="98" fill="#E85D26"/>
    <text x="116" y="371" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="86" font-weight="900" letter-spacing="-2">市场恢复</text>

    <text x="100" y="458" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">全球约20%海运原油仍经霍尔木兹海峡，任何…</text>

    <text x="846" y="164" fill="#E85D26" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1.6">支撑判断</text>

    <line x1="846" y1="192" x2="1186" y2="192" stroke="#282826" stroke-width="2"/>
    <text x="846" y="232" fill="#F0ECE5" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="56" font-weight="900">20%</text>
    <text x="846" y="266" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">全球海运原油</text>
    <text x="846" y="294" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">仍经该海峡</text>

    <line x1="846" y1="332" x2="1186" y2="332" stroke="#282826" stroke-width="2"/>
    <text x="846" y="376" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">01</text>
    <text x="902" y="376" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">断航判断退居次位</text>

    <line x1="846" y1="414" x2="1186" y2="414" stroke="#282826" stroke-width="2"/>
    <text x="846" y="458" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">02</text>
    <text x="902" y="458" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">持续恢复成为主问</text>

    <line x1="846" y1="496" x2="1186" y2="496" stroke="#282826" stroke-width="2"/>
    <text x="846" y="540" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">03</text>
    <text x="902" y="540" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">高成本停留时间更关键</text>

    <rect x="602" y="330" width="146" height="146" fill="#111111"/>
    <text x="675" y="385" text-anchor="middle" fill="#E85D26" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="54" font-weight="900">≠</text>
    <text x="675" y="430" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="1.2">OPEN</text>
    <text x="675" y="451" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="1.2">IS NOT</text>
    <text x="675" y="472" text-anchor="middle" fill="#F0ECE5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="1.2">NORMAL</text>
  </g>

  <g id="annotations">
    <line x1="98" y1="490" x2="584" y2="490" stroke="#111111" stroke-width="3"/>
    <text x="98" y="533" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">恢复的是通道，不是定价、保险与交付秩序。</text>

    <circle cx="786" cy="126" r="6" fill="#E85D26"/>
    <circle cx="804" cy="126" r="6" fill="#F0ECE5"/>
    <circle cx="822" cy="126" r="6" fill="#E85D26"/>
  </g>
</svg>