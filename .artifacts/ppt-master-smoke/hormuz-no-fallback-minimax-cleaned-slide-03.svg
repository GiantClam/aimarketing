<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E85D26"/>
      <stop offset="100%" stop-color="#D14E1E"/>
    </linearGradient>
  </defs>
  
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#111111"/>
  </g>
  
  <g id="chrome">
    <rect x="0" y="0" width="1280" height="720" fill="none" stroke="#282826" stroke-width="2"/>
    <rect x="40" y="40" width="1200" height="640" fill="none" stroke="#282826" stroke-width="1"/>
    <rect x="48" y="48" width="1184" height="624" fill="none" stroke="#282826" stroke-width="1"/>
    <line x1="0" y1="140" x2="1280" y2="140" stroke="#282826" stroke-width="2"/>
    <line x1="0" y1="144" x2="1280" y2="144" stroke="#E85D26" stroke-width="3"/>
    <line x1="0" y1="580" x2="1280" y2="580" stroke="#282826" stroke-width="2"/>
    <line x1="0" y1="584" x2="1280" y2="584" stroke="#E85D26" stroke-width="1"/>
  </g>
  
  <g id="content">
    <g id="kicker-section">
      <text x="80" y="110" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#E85D26" letter-spacing="8">核心宣言</text>
    </g>
    
    <g id="main-focus">
      <rect x="80" y="180" width="520" height="280" fill="#1A1A18"/>
      <rect x="80" y="180" width="520" height="280" fill="none" stroke="#E85D26" stroke-width="2"/>
      
      <text x="120" y="280" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#E85D26">≠</text>
      
      <text x="200" y="280" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#F0ECE5">风险消散</text>
      
      <line x1="120" y1="320" x2="560" y2="320" stroke="#E85D26" stroke-width="1" stroke-dasharray="4,4"/>
      
      <text x="120" y="360" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F0ECE5" opacity="0.9">重启通航</text>
      <text x="120" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#F0ECE5">≠</text>
      <text x="160" y="400" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#F0ECE5" opacity="0.9">稳定通航</text>
      <text x="120" y="440" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#F0ECE5" opacity="0.6">截至2026年6月24日</text>
    </g>
    
    <g id="judgment-section">
      <rect x="640" y="180" width="540" height="280" fill="none"/>
      
      <text x="680" y="230" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#F0ECE5" letter-spacing="2">核心判断</text>
      
      <line x1="680" y1="250" x2="800" y2="250" stroke="#E85D26" stroke-width="4"/>
      
      <text x="680" y="300" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#F0ECE5" opacity="0.8">霍尔木兹海峡重启通航，但</text>
      <text x="680" y="340" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#E85D26">安全形势未稳</text>
      <text x="680" y="380" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#E85D26">费用机制未定</text>
      <text x="680" y="420" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#E85D26">控制权安排未明</text>
    </g>
    
    <g id="annotations">
      <g id="bullet-1">
        <circle cx="680" cy="510" r="6" fill="#E85D26"/>
        <text x="700" y="516" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F0ECE5">油轮、LNG船及保险条款面临结构性重置</text>
      </g>
      
      <g id="bullet-2">
        <circle cx="680" cy="540" r="6" fill="#E85D26"/>
        <text x="700" y="546" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F0ECE5">任何新的军事摩擦、扣船事件将即时触发市场恐慌</text>
      </g>
      
      <g id="bullet-3">
        <circle cx="680" cy="570" r="6" fill="#E85D26"/>
        <text x="700" y="576" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F0ECE5">买方库存与采购节奏将持续承压</text>
      </g>
    </g>
    
    <g id="visual-element">
      <rect x="1000" y="480" width="140" height="140" fill="none" stroke="#E85D26" stroke-width="2"/>
      <rect x="1010" y="490" width="120" height="120" fill="#1A1A18"/>
      <text x="1070" y="560" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#E85D26" text-anchor="middle">!</text>
    </g>
  </g>
  
  <g id="footer">
    <rect x="80" y="620" width="200" height="4" fill="url(#accentGrad)"/>
    <text x="80" y="660" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#F0ECE5" opacity="0.5">第3页 / 共4页</text>
    <text x="1200" y="660" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#F0ECE5" opacity="0.5" text-anchor="end">霍尔木兹海峡现状与全球能源运输影响</text>
  </g>
</svg>