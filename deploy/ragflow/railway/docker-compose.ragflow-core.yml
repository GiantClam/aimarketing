services:
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.26.0}
    command:
      - --enable-adminserver
      - --init-model-provider-tables
    env_file:
      - .env
    ports:
      - "${SVR_WEB_HTTP_PORT:-80}:80"
      - "${SVR_WEB_HTTPS_PORT:-443}:443"
      - "${SVR_HTTP_PORT:-9380}:9380"
      - "${ADMIN_SVR_HTTP_PORT:-9381}:9381"
      - "${SVR_MCP_PORT:-9382}:9382"
      - "${GO_HTTP_PORT:-9384}:9384"
      - "${GO_ADMIN_PORT:-9383}:9383"
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
    depends_on:
      infinity:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  infinity:
    image: infiniflow/infinity:v0.7.0
    command: ["-f", "/infinity_conf.toml"]
    env_file:
      - .env
    ports:
      - "${INFINITY_THRIFT_PORT:-23817}:23817"
      - "${INFINITY_HTTP_PORT:-23820}:23820"
      - "${INFINITY_PSQL_PORT:-5432}:5432"
    volumes:
      - infinity_data:/var/infinity
      - ./infinity_conf.toml:/infinity_conf.toml
    healthcheck:
      test: ["CMD", "curl", "http://localhost:23820/admin/node/current"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  redis:
    image: valkey/valkey:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

volumes:
  infinity_data:
  redis_data:
