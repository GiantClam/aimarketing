name: Deploy OpenCode runtimes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/cloudflare/opencode-runner/**"
      - "infra/cloudflare/dashi-ppt-smoke/**"
      - "lib/ai-runtime/**"
      - "lib/ai-entry/runtime/**"
      - "app/api/ai/chat/route.ts"
      - "railway.json"
      - "Dockerfile"

concurrency:
  group: opencode-runtime-production
  cancel-in-progress: true

jobs:
  deploy-cloudflare:
    name: Deploy Cloudflare OpenCode runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/cloudflare/opencode-runner/package-lock.json
      - name: Install runner dependencies
        working-directory: infra/cloudflare/opencode-runner
        run: npm ci
      - name: Verify runner
        working-directory: infra/cloudflare/opencode-runner
        run: |
          npm test
          npm run typecheck
      - name: Build and publish Dashi container
        working-directory: infra/cloudflare/opencode-runner
        run: >-
          npx wrangler containers build .
          --tag registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/aimarketing-opencode-runner-pptmastercontainer:ppt-dashi-v0.4.4-fdbb145-20260720
          --push
      - name: Build and publish Dashi smoke container
        working-directory: infra/cloudflare/dashi-ppt-smoke
        run: >-
          npx wrangler containers build .
          --tag registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/aimarketing-dashi-ppt-smoke-sandbox:dashi-v0.4.4-fdbb145-20260720
          --push
      - name: Deploy Cloudflare Worker
        working-directory: infra/cloudflare/opencode-runner
        run: npx wrangler deploy
      - name: Deploy Dashi smoke Worker
        working-directory: infra/cloudflare/dashi-ppt-smoke
        run: npx wrangler deploy --containers-rollout=immediate
