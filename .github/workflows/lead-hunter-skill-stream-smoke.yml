name: Lead Hunter Skill Stream Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

jobs:
  lead-hunter-skill-stream-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check database configuration
        id: database-config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        shell: bash
        run: |
          if [[ -n "${DATABASE_URL:-}" || -n "${POSTGRES_URL:-}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping lead hunter skill stream smoke because no database secret is configured."
          fi

      - name: Checkout
        if: steps.database-config.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.database-config.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        if: steps.database-config.outputs.available == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        if: steps.database-config.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Ensure lead hunter schema
        if: steps.database-config.outputs.available == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          pnpm migrate:enterprise:dify
          pnpm migrate:lead-hunter
          pnpm migrate:lead-hunter:evidence

      - name: Run lead hunter skill stream smoke (company + contact)
        if: steps.database-config.outputs.available == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: pnpm test:lead-hunter:skill-stream:all
