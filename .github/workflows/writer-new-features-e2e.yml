name: Writer New Features E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/writer-new-features-e2e.yml"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.mjs"
      - ".env.example"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/writer-new-features-e2e.yml"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.mjs"
      - ".env.example"

jobs:
  writer-new-features:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check database configuration
        id: database-config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        shell: bash
        run: |
          if [[ -n "${DATABASE_URL:-}" || -n "${POSTGRES_URL:-}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping writer new-features E2E because no database secret is configured."
          fi

      - name: Checkout
        if: steps.database-config.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.database-config.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        if: steps.database-config.outputs.available == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python
        if: steps.database-config.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        if: steps.database-config.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        if: steps.database-config.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run lint
        if: steps.database-config.outputs.available == 'true'
        run: pnpm lint

      - name: Run TypeScript check
        if: steps.database-config.outputs.available == 'true'
        run: pnpm exec tsc --noEmit

      - name: Run writer new-features E2E
        if: steps.database-config.outputs.available == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: pnpm test:e2e:writer:new-features

      - name: Upload writer E2E artifacts
        if: always() && steps.database-config.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: writer-new-features-artifacts
          path: artifacts/writer-new-features/**
          if-no-files-found: warn
