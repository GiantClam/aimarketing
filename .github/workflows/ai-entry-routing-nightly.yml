name: AI Entry Routing Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  routing-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check database configuration
        id: database-config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        shell: bash
        run: |
          if [[ -n "${DATABASE_URL:-}" || -n "${POSTGRES_URL:-}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping AI entry routing nightly check because no database secret is configured."
          fi

      - name: Checkout
        if: steps.database-config.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.database-config.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        if: steps.database-config.outputs.available == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        if: steps.database-config.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run AI entry routing nightly check
        if: steps.database-config.outputs.available == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          AI_ENTRY_NIGHTLY_SAMPLE_DAYS: "7"
          AI_ENTRY_NIGHTLY_SAMPLE_SIZE: "80"
          AI_ENTRY_NIGHTLY_MIN_SAMPLE_FOR_GATE: "20"
          AI_ENTRY_NIGHTLY_MAX_FALLBACK_RATE: "0.45"
          AI_ENTRY_NIGHTLY_MAX_LOW_CONFIDENCE_RATE: "0.75"
        run: pnpm test:ai-entry:routing-nightly

      - name: Upload nightly routing report
        if: always() && steps.database-config.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-entry-routing-nightly-report
          path: artifacts/ai-entry/routing-nightly/**
          if-no-files-found: warn
